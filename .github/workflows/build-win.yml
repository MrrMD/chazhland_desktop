name: Build desktop

# Сборка десктоп-дистрибутивов на раннерах GitHub из ветки dev (рабочая ветка).
# Windows — на windows-раннере (NSIS-установщик + zip), Linux — на ubuntu-раннере (AppImage).
# Нативный node-datachannel (WebRTC для торрент-просмотра) ставится `npm ci` под целевую ОС
# и работает в Electron (N-API, пересборка не нужна).
#
# Где брать готовый билд:
#  - push в dev → джоба СОБИРАЕТ (проверяет, что компилируется/пакуется), но НИЧЕГО не грузит;
#  - push тега vX.Y.Z → каждая платформенная джоба заливает свои установщики НАПРЯМУЮ в GitHub Release
#      (softprops/action-gh-release). Ассеты релиза хранятся ОТДЕЛЬНО и НЕ попадают под квоту Actions-
#      артефактов (она переполнялась инсталляторами ~685 МБ и валила раздачу) — постоянная ссылка;
#  - ручной запуск (workflow_dispatch) → артефакты на странице запуска (best-effort, не валит сборку
#      при переполненной квоте): "chazhland-win-x64" (Setup .exe + .zip), "chazhland-linux-x64" (.AppImage).
#
# mpv/yt-dlp: на Windows вкладываются в сборку (скачиваются ниже); на Linux НЕ бандлятся —
# там mpv ставится системно (apt install mpv yt-dlp), код берёт его из PATH.

on:
  push:
    branches: [ dev ]
    tags: [ 'v*' ]
  workflow_dispatch:

concurrency:
  group: build-desktop-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # нужно для создания Release по тегу

jobs:
  windows:
    name: Build & package (windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch mpv + yt-dlp (для просмотра по ссылке/MKV)
        shell: pwsh
        continue-on-error: true   # не валим сборку, если зеркало бинарей недоступно — ядро всё равно соберётся
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $dir = "resources/mpv/win32-x64"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          # yt-dlp — стабильная ссылка latest
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "$dir/yt-dlp.exe"
          # mpv — последний x86_64-сборки zhongfly/mpv-winbuild (имя ассета версионируется, ищем через API)
          $headers = @{ "User-Agent" = "gh-actions"; "Authorization" = "Bearer $env:GH_TOKEN" }
          $rel = Invoke-RestMethod -Headers $headers -Uri "https://api.github.com/repos/zhongfly/mpv-winbuild/releases/latest"
          $asset = $rel.assets | Where-Object { $_.name -match '^mpv-x86_64-\d.*\.7z$' } | Select-Object -First 1
          if ($asset) {
            Invoke-WebRequest -Headers @{ "User-Agent" = "gh-actions" } -Uri $asset.browser_download_url -OutFile mpv.7z
            7z x mpv.7z -ompv-extract -y | Out-Null
            $exe = Get-ChildItem -Path mpv-extract -Recurse -Filter mpv.exe | Select-Object -First 1
            if ($exe) { Copy-Item $exe.FullName "$dir/mpv.exe" -Force }
          }
          Get-ChildItem $dir

      - name: Build renderer + electron
        run: npm run build

      - name: Package Windows installer + zip
        run: npx --no-install electron-builder --win nsis zip --publish never

      - name: Publish Windows installers to Release (tag)
        # Заливаем .exe/.zip ПРЯМО в Release по тегу — мимо Actions-артефактов (их квота переполнялась
        # инсталляторами и валила раздачу). action-gh-release создаёт релиз, если его ещё нет, и дополняет
        # ассетами; linux-джоба добавит свой .AppImage в тот же релиз.
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
          files: |
            release/*.exe
            release/*.zip

      - name: Upload Windows artifact (manual runs only)
        # Ручной запуск без тега: кладём в Actions-артефакты. best-effort — переполненная квота
        # хранилища НЕ должна валить сборку.
        if: github.event_name == 'workflow_dispatch'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: chazhland-win-x64
          path: |
            release/*.exe
            release/*.zip
          if-no-files-found: error
          retention-days: 14

  linux:
    name: Build & package (linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer + electron
        run: npm run build

      - name: Package Linux AppImage
        run: npx --no-install electron-builder --linux AppImage --publish never

      - name: Publish Linux AppImage to Release (tag)
        # см. коммент к Windows: заливаем напрямую в Release, мимо Actions-артефактов
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
          files: release/*.AppImage

      - name: Upload Linux artifact (manual runs only)
        if: github.event_name == 'workflow_dispatch'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: chazhland-linux-x64
          path: release/*.AppImage
          if-no-files-found: error
          retention-days: 14
